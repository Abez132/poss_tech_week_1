services:
  db:
    image: postgres
    container_name: task_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: task_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d task_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./BACKEND
    container_name: backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./BACKEND/.env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
